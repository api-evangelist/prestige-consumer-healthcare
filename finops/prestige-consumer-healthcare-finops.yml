principles:
  - name: Visibility
    description: Cost visibility for Prestige Consumer Healthcare comes from the negotiated contract artifacts and the consuming organization's AP / procurement system rather than from a provider usage API.
  - name: Allocation
    description: Allocate by the cost center or business unit listed on the contract; there is no provider-side tag surface.
  - name: Optimization
    description: Renegotiate at renewal; consolidate purchasing through procurement; benchmark against peer organizations where possible.
  - name: Accountability
    description: The contract owner / category manager is accountable for spend; review at the contract renewal cadence.
